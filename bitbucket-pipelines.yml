image: python:3.10

pipelines:
  # 1. TRIGGER: Runs on every PR targeting the master branch
  pull-requests:
    'master':
      - step:
          name: "AI Code Review (Shared Repo via Clone)"
          # Set fail-fast to false so AI downtime doesn't block the PR
          fail-fast: false
          script:
            # Configure AI_CODE_REVIEW_AGENT_REPO in Repository Variables
            # Example: https://bitbucket.org/<workspace>/ai-code-review-agent.git
            - test -n "$AI_CODE_REVIEW_AGENT_REPO" || (echo "AI_CODE_REVIEW_AGENT_REPO is required" && exit 1)
            - test -n "$PRIMARY_MODEL" || (echo "PRIMARY_MODEL is required" && exit 1)
            - test -n "$TEAM_NAME" || (echo "TEAM_NAME is required" && exit 1)
            - git clone "$AI_CODE_REVIEW_AGENT_REPO" reflex-reviewer
            - pip install ./reflex-reviewer
            - python -m reflex_reviewer.review --team-name "$TEAM_NAME" --primary-model "$PRIMARY_MODEL"
          services:
            - docker

  # 2. TRIGGER: Runs only after a PR is successfully merged into master
  branches:
    master:
      - step:
          name: "Post-Merge RLHF Data Collection (Shared Repo via Clone)"
          # Set fail-fast to false as learning is non-critical for Post PR Merge
          fail-fast: false
          script:
            - test -n "$AI_CODE_REVIEW_AGENT_REPO" || (echo "AI_CODE_REVIEW_AGENT_REPO is required" && exit 1)
            - test -n "$PRIMARY_MODEL" || (echo "PRIMARY_MODEL is required" && exit 1)
            - test -n "$TEAM_NAME" || (echo "TEAM_NAME is required" && exit 1)
            - git clone "$AI_CODE_REVIEW_AGENT_REPO" reflex-reviewer
            - pip install ./reflex-reviewer
            - python -m reflex_reviewer.distill --team-name "$TEAM_NAME" --primary-model "$PRIMARY_MODEL" --dpo-training-data-dir "data"

  custom:
    weekly-dpo-fine-tune:
      - step:
          name: "Weekly GPT-5.4 mini DPO Fine-Tuning (Shared Repo via Clone)"
          # Set fail-fast to false as fine-tuning is non-critical Code Review
          fail-fast: false
          script:
            - test -n "$AI_CODE_REVIEW_AGENT_REPO" || (echo "AI_CODE_REVIEW_AGENT_REPO is required" && exit 1)
            - test -n "$PRIMARY_MODEL" || (echo "PRIMARY_MODEL is required" && exit 1)
            - test -n "$TEAM_NAME" || (echo "TEAM_NAME is required" && exit 1)
            - git clone "$AI_CODE_REVIEW_AGENT_REPO" reflex-reviewer
            - pip install ./reflex-reviewer
            - python -m reflex_reviewer.refine --team-name "$TEAM_NAME" --primary-model "$PRIMARY_MODEL" --dpo-training-data-dir "data"