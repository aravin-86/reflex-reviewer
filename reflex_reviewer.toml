# Environment placeholder standard used by reflex_reviewer/config.py:
#   ${ENV_NAME}          -> use environment variable value (empty if unset)
#   ${ENV_NAME|-default} -> use environment variable value or fallback default
# Placeholders can be embedded in complex strings (for example, URLs).
[vcs]
type = "${VCS_TYPE|-bitbucket}"
base_url = "${VCS_BASE_URL}"
project = "${VCS_PROJECT_KEY}"
repo_slug = "${VCS_REPO_SLUG}"
pr_id = "${VCS_PR_ID}"
token = "${VCS_TOKEN}"

[litellm]
base_url = "${LITELLM_BASE_URL}"
proxy_url = "${LITELLM_PROXY_URL}"
api_key = "${LITELLM_API_KEY}"
chat_completions_path = "/chat/completions"
responses_path = "/responses"
files_path = "/files"
fine_tuning_jobs_path = "/fine_tuning/jobs"

[model]
draft_model = "${DRAFT_MODEL}"
judge_model = "${JUDGE_MODEL}"
stream_response = "${STREAM_RESPONSE|-false}"
# Supported endpoints: chat_completions (stateless default) or responses
# (stateful; use only if your org/backend supports previous_response_id flows).
model_endpoint = "${MODEL_ENDPOINT|-chat_completions}"
reasoning_effort = "${LITELLM_REASONING_EFFORT|-high}"
unsupported_reasoning_models = ["gpt-4.1"]

[oauth]
token_url = "${OAUTH2_TOKEN_URL}"
user_id = "${OAUTH2_USER_ID}"
user_secret = "${OAUTH2_USER_SECRET}"
refresh_buffer_seconds = "${OAUTH2_REFRESH_BUFFER_SECONDS|-60}"
litellm_scope = "${OAUTH2_TOKEN_LITELLM_SCOPE|-generate_code/openid generate_code/use}"
token_cache_file = "data/.user_oauth2_token_cache.json"

[review]
response_state_file = "data/review_previous_response_ids.json"
response_state_ttl_days = 30
max_diff_chars = 2400000
max_existing_feedback_comments = 20
activities_fetch_limit = 1000
sanitized_comment_max_chars = 500
skip_extensions = [
  ".json",
  ".lock",
  ".min.js",
  ".map",
  ".csv",
  ".bin",
  ".pdf",
  ".png",
  ".jpg",
]
skip_files = ["package-lock.json", "yarn.lock", "pnpm-lock.yaml", "go.sum"]

[distill]
activities_fetch_limit = 1000
max_llm_threads = 20
diff_skip_extensions = [".json", ".lock", ".min.js", ".map", ".bin"]

[refine]
timeout_seconds = 10800
initial_poll_interval_seconds = 30
max_poll_interval_seconds = 300
train_split_ratio = 0.9
min_samples_to_train = 5